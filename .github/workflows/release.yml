name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Validate And Create Release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare Release
        run: bash Scripts/prepare-release.sh

      - name: Archive Benchmark Evidence
        id: evidence
        run: |
          EVIDENCE_DIR=$(bash Scripts/archive-benchmark-evidence.sh Benchmarks/Results/latest "$GITHUB_REF_NAME")
          echo "dir=$EVIDENCE_DIR" >> "$GITHUB_OUTPUT"

      - name: Prepare Version
        id: version
        run: echo "number=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate Changelog
        run: bash Scripts/validate-changelog.sh CHANGELOG.md "$GITHUB_REF_NAME"

      - name: Validate Version Surface
        run: bash Scripts/validate-version-surface.sh "$GITHUB_REF_NAME"

      - name: Validate Benchmark Thresholds
        run: bash Scripts/validate-benchmark-thresholds.sh Benchmarks/Results/latest Benchmarks/Results Benchmarks/benchmark-thresholds.json

      - name: Build Release Notes
        id: notes
        env:
          EVIDENCE_DIR: ${{ steps.evidence.outputs.dir }}
        run: |
          bash Scripts/build-release-notes.sh "$GITHUB_REF_NAME" "$EVIDENCE_DIR" "$EVIDENCE_DIR/release-body.md" "${{ github.event.repository.name }}"
          {
            echo "body<<EOF"
            cat "$EVIDENCE_DIR/release-body.md"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.notes.outputs.body }}
          files: |
            ${{ steps.evidence.outputs.dir }}/benchmark-report.json
            ${{ steps.evidence.outputs.dir }}/benchmark-summary.md
            ${{ steps.evidence.outputs.dir }}/environment.json
            ${{ steps.evidence.outputs.dir }}/metadata.json
            ${{ steps.evidence.outputs.dir }}/release-proof.md
            ${{ steps.evidence.outputs.dir }}/benchmark-delta.md
            ${{ steps.evidence.outputs.dir }}/release-notes-proof.md
            ${{ steps.evidence.outputs.dir }}/release-blockers.md
            ${{ steps.evidence.outputs.dir }}/public-proof-status.md
            ${{ steps.evidence.outputs.dir }}/public-proof-status.json
            ${{ steps.evidence.outputs.dir }}/flagship-demo-pack.md
            ${{ steps.evidence.outputs.dir }}/flagship-demo-share-pack.tar.gz
            ${{ steps.evidence.outputs.dir }}/intelligent-camera-success.png
            ${{ steps.evidence.outputs.dir }}/intelligent-camera-run.mp4
            ${{ steps.evidence.outputs.dir }}/caption.txt
            ${{ steps.evidence.outputs.dir }}/device-evidence-handoff.md
            ${{ steps.evidence.outputs.dir }}/device-evidence-handoff.json
            ${{ steps.evidence.outputs.dir }}/device-evidence-handoff.tar.gz
            ${{ steps.evidence.outputs.dir }}/release-body.md
            ${{ steps.evidence.outputs.dir }}/artifact-manifest.json
            ${{ steps.evidence.outputs.dir }}/checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "25 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze_push_guard:
    name: Analyze (Swift)
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Record CodeQL push policy
        run: |
          test -f .github/workflows/codeql.yml
          echo "Push and pull_request runs keep a fast success gate."
          echo "Full Swift CodeQL analysis runs on schedule and workflow_dispatch."

  analyze_full:
    name: Analyze (Swift)
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: swift
            build-mode: manual

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          dependency-caching: true

      - name: Build Swift Package
        run: swift build --arch arm64

      - name: Analyze
        uses: github/codeql-action/analyze@v4.35.1
        with:
          category: "/language:${{ matrix.language }}"

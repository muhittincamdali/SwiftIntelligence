name: Deploy Documentation

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Build Documentation
        run: bash Scripts/build-docs.sh ./docs

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Package GitHub Pages Artifact
        run: |
          rm -f github-pages.tar github-pages.tar.gz
          COPYFILE_DISABLE=1 tar --format=ustar -cf github-pages.tar -C ./docs .
          gzip -f github-pages.tar

      - name: Upload Pages artifact archive
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ./github-pages.tar.gz
          overwrite: true
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

    <text x="144" y="304" fill="#FFFFFF" font-size="28" font-weight="800">release-grade posture · Mac + iPhone floor · flagship + secondary media published</text>

    <rect x="110" y="390" width="344" height="224" rx="28" fill="#111F35" stroke="#F05138" stroke-opacity="0.24"/>
    <text x="142" y="434" fill="#FFB3A8" font-size="21" font-weight="700">Flagship path</text>
    <text x="142" y="480" fill="#FFFFFF" font-size="35" font-weight="800">IntelligentCamera</text>
    <text x="142" y="522" fill="#D7E6FF" font-size="21" font-weight="500">Vision → NLP → Privacy</text>
    <text x="142" y="566" fill="#D7E6FF" font-size="20" font-weight="500">strongest repo story</text>
    <text x="142" y="596" fill="#D7E6FF" font-size="20" font-weight="500">best first proof path</text>
    <text x="142" y="626" fill="#9FC5FF" font-size="18" font-weight="700">Compare first: raw Apple Vision</text>


    <radialGradient id="show-blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 176) rotate(140) scale(360 280)">
      <stop stop-color="#0A84FF" stop-opacity="0.34"/>

    <text x="560" y="480" fill="#FFFFFF" font-size="35" font-weight="800">SmartTranslator</text>
    <text x="560" y="522" fill="#D7E6FF" font-size="21" font-weight="500">NLP → Privacy → Speech</text>
    <text x="560" y="566" fill="#D7E6FF" font-size="20" font-weight="500">text-heavy user-visible output</text>
    <text x="560" y="596" fill="#D7E6FF" font-size="20" font-weight="500">not a flagship proof claim</text>
    <text x="560" y="626" fill="#9FC5FF" font-size="18" font-weight="700">Compare first: NaturalLanguage</text>

    <rect x="946" y="390" width="344" height="224" rx="28" fill="#171A30" stroke="#BF5AF2" stroke-opacity="0.24"/>

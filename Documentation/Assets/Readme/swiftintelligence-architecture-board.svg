    <text x="978" y="558" fill="#D7E6FF" font-size="21" font-weight="500">Tokenization</text>
    <text x="978" y="590" fill="#D7E6FF" font-size="21" font-weight="500">Boundary controls</text>
    <text x="978" y="622" fill="#D7E6FF" font-size="21" font-weight="500">Observability</text>


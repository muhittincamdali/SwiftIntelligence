      <stop offset="1" stop-color="#081321"/>
    </linearGradient>
    <radialGradient id="arch-blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1150 140) rotate(140) scale(320 280)">
      <stop stop-color="#0A84FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0A84FF" stop-opacity="0"/>

    <text x="110" y="132" fill="#FFFFFF" font-size="52" font-weight="800">Architecture Signal</text>
    <text x="110" y="174" fill="#AFC6E9" font-size="21" font-weight="500">Workflows on top, product lanes in the middle, proof spine underneath.</text>

    <rect x="110" y="226" width="1180" height="104" rx="28" fill="#102239" stroke="#5AC8FA" stroke-opacity="0.22"/>
    <text x="144" y="266" fill="#9FC5FF" font-size="21" font-weight="700">Workflow layer</text>
    <text x="144" y="304" fill="#FFFFFF" font-size="28" font-weight="800">IntelligentCamera · SmartTranslator · VoiceAssistant · future flagship demos</text>


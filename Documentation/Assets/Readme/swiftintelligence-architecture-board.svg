    <text x="142" y="434" fill="#FFB3A8" font-size="21" font-weight="700">Perception lane</text>
    <text x="142" y="480" fill="#FFFFFF" font-size="35" font-weight="800">Vision + ML</text>
    <text x="142" y="526" fill="#D7E6FF" font-size="21" font-weight="500">Classification</text>
    <text x="142" y="558" fill="#D7E6FF" font-size="21" font-weight="500">Detection</text>
    <text x="142" y="590" fill="#D7E6FF" font-size="21" font-weight="500">OCR and enhancement</text>

    <rect x="528" y="392" width="344" height="214" rx="28" fill="#102239" stroke="#0A84FF" stroke-opacity="0.24"/>
    <text x="560" y="434" fill="#9FC5FF" font-size="21" font-weight="700">Language lane</text>
    <text x="560" y="480" fill="#FFFFFF" font-size="35" font-weight="800">NLP + Speech</text>
    <text x="560" y="516" fill="#FFFFFF" font-size="35" font-weight="800">+ Reasoning</text>
    <text x="560" y="558" fill="#D7E6FF" font-size="21" font-weight="500">Summaries</text>
    <text x="560" y="590" fill="#D7E6FF" font-size="21" font-weight="500">Entities and intent</text>
    <text x="560" y="622" fill="#D7E6FF" font-size="21" font-weight="500">Voice output</text>

    <rect x="946" y="392" width="344" height="214" rx="28" fill="#10281D" stroke="#34C759" stroke-opacity="0.24"/>
    <text x="978" y="434" fill="#B5F0C5" font-size="21" font-weight="700">Trust lane</text>

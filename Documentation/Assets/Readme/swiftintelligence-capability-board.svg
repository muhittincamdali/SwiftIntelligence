  </defs>

  <rect width="1400" height="940" rx="42" fill="#040A14"/>
  <rect x="34" y="32" width="1332" height="876" rx="40" fill="url(#cap-bg)"/>
  <rect x="34" y="32" width="1332" height="876" rx="40" fill="url(#cap-blue)"/>
  <rect x="72" y="68" width="1256" height="804" rx="34" fill="#0A1526" fill-opacity="0.84" stroke="#F3F7FF" stroke-opacity="0.08"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="110" y="132" fill="#FFFFFF" font-size="52" font-weight="800">Product Surface</text>
    <text x="110" y="174" fill="#AFC6E9" font-size="21" font-weight="500">Five maintained lanes, one flagship path, and one release-proof story.</text>

    <rect x="110" y="226" width="370" height="206" rx="28" fill="#111F35" stroke="#F05138" stroke-opacity="0.24"/>
    <rect x="138" y="252" width="104" height="34" rx="17" fill="#F05138"/>
    <text x="167" y="275" fill="#FFFFFF" font-size="18" font-weight="800">Vision</text>
    <text x="138" y="324" fill="#FFFFFF" font-size="34" font-weight="800">Scene understanding</text>
    <text x="138" y="370" fill="#D7E6FF" font-size="19" font-weight="500">Classification, OCR, detection,</text>
    <text x="138" y="400" fill="#D7E6FF" font-size="19" font-weight="500">segmentation, and enhancement.</text>

    <rect x="516" y="226" width="370" height="206" rx="28" fill="#102239" stroke="#0A84FF" stroke-opacity="0.24"/>
    <rect x="544" y="252" width="166" height="34" rx="17" fill="#0A84FF"/>
    <text x="563" y="275" fill="#FFFFFF" font-size="17" font-weight="800">NaturalLanguage</text>
    <text x="544" y="324" fill="#FFFFFF" font-size="34" font-weight="800">Text intelligence</text>
    <text x="544" y="370" fill="#D7E6FF" font-size="19" font-weight="500">Summaries, entities, keywords,</text>
    <text x="544" y="400" fill="#D7E6FF" font-size="19" font-weight="500">topics, and analysis helpers.</text>

    <rect x="922" y="226" width="370" height="206" rx="28" fill="#10281D" stroke="#34C759" stroke-opacity="0.24"/>
    <rect x="950" y="252" width="116" height="34" rx="17" fill="#34C759"/>
    <text x="978" y="275" fill="#FFFFFF" font-size="18" font-weight="800">Privacy</text>
    <text x="950" y="324" fill="#FFFFFF" font-size="34" font-weight="800">Guard rails</text>
    <text x="950" y="370" fill="#D7E6FF" font-size="19" font-weight="500">Tokenization, anonymization,</text>
    <text x="950" y="400" fill="#D7E6FF" font-size="19" font-weight="500">and safer AI handling boundaries.</text>

    <rect x="110" y="468" width="370" height="206" rx="28" fill="#171A30" stroke="#BF5AF2" stroke-opacity="0.24"/>
    <rect x="138" y="494" width="112" height="34" rx="17" fill="#BF5AF2"/>
    <text x="165" y="517" fill="#FFFFFF" font-size="18" font-weight="800">Speech</text>
    <text x="138" y="566" fill="#FFFFFF" font-size="34" font-weight="800">Voice output</text>
    <text x="138" y="612" fill="#D7E6FF" font-size="19" font-weight="500">Synthesis, voice catalogs, and</text>
    <text x="138" y="642" fill="#D7E6FF" font-size="19" font-weight="500">assistant-style response delivery.</text>

    <rect x="516" y="468" width="370" height="206" rx="28" fill="#251F13" stroke="#FF9F0A" stroke-opacity="0.24"/>
    <rect x="544" y="494" width="154" height="34" rx="17" fill="#FF9F0A"/>
    <text x="570" y="517" fill="#FFFFFF" font-size="18" font-weight="800">Benchmarks</text>
    <text x="544" y="566" fill="#FFFFFF" font-size="34" font-weight="800">Proof discipline</text>
    <text x="544" y="612" fill="#D7E6FF" font-size="19" font-weight="500">Thresholds, manifests, checksums,</text>
    <text x="544" y="642" fill="#D7E6FF" font-size="19" font-weight="500">provenance, and immutable bundles.</text>

    <rect x="922" y="468" width="370" height="206" rx="28" fill="#0E2037" stroke="#5AC8FA" stroke-opacity="0.24"/>
    <rect x="950" y="494" width="156" height="34" rx="17" fill="#5AC8FA"/>
    <text x="975" y="517" fill="#FFFFFF" font-size="18" font-weight="800">Release Proof</text>
    <text x="950" y="566" fill="#FFFFFF" font-size="34" font-weight="800">Trust surface</text>
    <text x="950" y="612" fill="#D7E6FF" font-size="19" font-weight="500">Readiness, release proof, media,</text>
    <text x="950" y="642" fill="#D7E6FF" font-size="19" font-weight="500">and the current device floor.</text>

    <rect x="110" y="726" width="1182" height="96" rx="24" fill="#101C2D" stroke="#F3F7FF" stroke-opacity="0.08"/>
    <text x="144" y="764" fill="#9FC5FF" font-size="20" font-weight="700">Flagship story</text>
    <text x="144" y="800" fill="#FFFFFF" font-size="26" font-weight="800">IntelligentCamera closes the strongest maintained route.</text>
    <text x="832" y="764" fill="#FFD6AA" font-size="20" font-weight="700">Next routes</text>
    <text x="832" y="800" fill="#FFFFFF" font-size="24" font-weight="800">SmartTranslator and VoiceAssistant</text>

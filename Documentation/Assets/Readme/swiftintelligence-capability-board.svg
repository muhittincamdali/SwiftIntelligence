    <text x="140" y="368" fill="#D7E6FF" font-size="19" font-weight="500">Classification, OCR, detection,</text>
    <text x="140" y="398" fill="#D7E6FF" font-size="19" font-weight="500">segmentation, and enhancement.</text>

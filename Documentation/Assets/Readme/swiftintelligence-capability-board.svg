    <text x="546" y="618" fill="#D7E6FF" font-size="19" font-weight="500">Versioned artifacts, thresholds,</text>
    <text x="546" y="648" fill="#D7E6FF" font-size="19" font-weight="500">provenance, and immutable bundles.</text>
    <text x="546" y="678" fill="#FFD4A6" font-size="18" font-weight="700">Claims stay inside the proof envelope</text>


      <stop stop-color="#071120"/>
      <stop offset="0.56" stop-color="#0D1C34"/>
      <stop offset="1" stop-color="#081321"/>
    </linearGradient>
    <radialGradient id="cap-blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1160 142) rotate(140) scale(320 280)">
      <stop stop-color="#0A84FF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#0A84FF" stop-opacity="0"/>

<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="90" y1="70" x2="1318" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#111D31"/>
      <stop offset="1" stop-color="#081624"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="280" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="920" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="36" flood-color="#000814" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1400" height="920" rx="40" fill="url(#bg)"/>
  <rect x="60" y="58" width="1280" height="804" rx="34" fill="#0B1728" fill-opacity="0.72" stroke="#F2F7FF" stroke-opacity="0.08"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="96" y="124" fill="#FFFFFF" font-size="52" font-weight="800">Product Surface</text>
    <text x="96" y="168" fill="#AFC6E9" font-size="24" font-weight="500">The repo is designed as an Apple-native workflow stack, not a pile of disconnected wrappers.</text>
  </g>

  <g filter="url(#shadow)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <rect x="92" y="224" width="376" height="220" rx="28" fill="#111F35" stroke="#F2F7FF" stroke-opacity="0.08"/>
    <rect x="112" y="248" width="108" height="38" rx="19" fill="#F05138"/>
    <text x="142" y="274" fill="#FFFFFF" font-size="18" font-weight="800">Vision</text>
    <text x="116" y="322" fill="#FFFFFF" font-size="32" font-weight="800">Scene understanding</text>
    <text x="116" y="366" fill="#D7E6FF" font-size="22" font-weight="500">Classification, OCR, detection, segmentation,</text>
    <text x="116" y="398" fill="#D7E6FF" font-size="22" font-weight="500">and image enhancement inside one maintained module.</text>
    <text x="116" y="430" fill="#9FC5FF" font-size="20" font-weight="700">Best first path: IntelligentCamera</text>

    <rect x="512" y="224" width="376" height="220" rx="28" fill="#102239" stroke="#F2F7FF" stroke-opacity="0.08"/>
    <rect x="532" y="248" width="170" height="38" rx="19" fill="#0A84FF"/>
    <text x="560" y="274" fill="#FFFFFF" font-size="18" font-weight="800">NaturalLanguage</text>
    <text x="536" y="322" fill="#FFFFFF" font-size="32" font-weight="800">Text intelligence</text>
    <text x="536" y="366" fill="#D7E6FF" font-size="22" font-weight="500">Summaries, entities, keywords, topics, and</text>
    <text x="536" y="398" fill="#D7E6FF" font-size="22" font-weight="500">language-aware pipeline building on Apple frameworks.</text>
    <text x="536" y="430" fill="#9FC5FF" font-size="20" font-weight="700">Compare against raw NaturalLanguage APIs</text>

    <rect x="932" y="224" width="376" height="220" rx="28" fill="#10281D" stroke="#F2F7FF" stroke-opacity="0.08"/>
    <rect x="952" y="248" width="116" height="38" rx="19" fill="#34C759"/>
    <text x="980" y="274" fill="#FFFFFF" font-size="18" font-weight="800">Privacy</text>
    <text x="956" y="322" fill="#FFFFFF" font-size="32" font-weight="800">Guard rails</text>
    <text x="956" y="366" fill="#D7E6FF" font-size="22" font-weight="500">Tokenization, anonymization, and secure handling</text>
    <text x="956" y="398" fill="#D7E6FF" font-size="22" font-weight="500">for AI flows that should stay privacy-first.</text>
    <text x="956" y="430" fill="#B5F0C5" font-size="20" font-weight="700">Security-aware by default</text>

    <rect x="92" y="490" width="376" height="220" rx="28" fill="#171A30" stroke="#F2F7FF" stroke-opacity="0.08"/>
    <rect x="112" y="514" width="120" height="38" rx="19" fill="#BF5AF2"/>
    <text x="140" y="540" fill="#FFFFFF" font-size="18" font-weight="800">Speech</text>
    <text x="116" y="588" fill="#FFFFFF" font-size="32" font-weight="800">Voice output</text>
    <text x="116" y="632" fill="#D7E6FF" font-size="22" font-weight="500">Speech synthesis, voice catalogs, and</text>
    <text x="116" y="664" fill="#D7E6FF" font-size="22" font-weight="500">assistant-style demo paths built on Apple-native surfaces.</text>
    <text x="116" y="696" fill="#E6C8FF" font-size="20" font-weight="700">Strong demo companion, not fake agent hype</text>

    <rect x="512" y="490" width="376" height="220" rx="28" fill="#262014" stroke="#F2F7FF" stroke-opacity="0.08"/>
    <rect x="532" y="514" width="164" height="38" rx="19" fill="#FF9F0A"/>
    <text x="560" y="540" fill="#FFFFFF" font-size="18" font-weight="800">Benchmarks</text>
    <text x="536" y="588" fill="#FFFFFF" font-size="32" font-weight="800">Evidence discipline</text>
    <text x="536" y="632" fill="#D7E6FF" font-size="22" font-weight="500">Versioned benchmark artifacts, threshold validation,</text>
    <text x="536" y="664" fill="#D7E6FF" font-size="22" font-weight="500">provenance checks, and immutable release bundles.</text>
    <text x="536" y="696" fill="#FFD4A6" font-size="20" font-weight="700">Claims stay inside the proof envelope</text>

    <rect x="932" y="490" width="376" height="220" rx="28" fill="#0E2037" stroke="#F2F7FF" stroke-opacity="0.08"/>
    <rect x="952" y="514" width="176" height="38" rx="19" fill="#5AC8FA"/>
    <text x="980" y="540" fill="#FFFFFF" font-size="18" font-weight="800">Release Proof</text>
    <text x="956" y="588" fill="#FFFFFF" font-size="32" font-weight="800">Public trust surface</text>
    <text x="956" y="632" fill="#D7E6FF" font-size="22" font-weight="500">Generated proof pages, latest release proof, media pack,</text>
    <text x="956" y="664" fill="#D7E6FF" font-size="22" font-weight="500">and device policy aligned to the README story.</text>
    <text x="956" y="696" fill="#9FC5FF" font-size="20" font-weight="700">Mac + iPhone floor, release-grade posture</text>
  </g>

  <rect x="92" y="756" width="1216" height="72" rx="24" fill="url(#line)" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="126" y="801" fill="#FFFFFF" font-size="24" font-weight="800">Flagship flow:</text>
    <text x="306" y="801" fill="#D7E6FF" font-size="24" font-weight="500">Vision -> NLP -> Privacy -> release proof</text>
    <text x="842" y="801" fill="#FFFFFF" font-size="24" font-weight="800">Current strongest demo:</text>
    <text x="1138" y="801" fill="#9FC5FF" font-size="24" font-weight="700">IntelligentCamera</text>
  </g>
</svg>
